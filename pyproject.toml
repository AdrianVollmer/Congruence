[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "RUF", # ruff-specific rules
    "A",   # flake8-builtins
]
ignore = [
    "B006",  # mutable default args in function signatures we intentionally keep as None-guarded
    "UP007", # X | Y union syntax requires Python 3.10+
]

[tool.ruff.lint.per-file-ignores]
"congruence/args.py" = ["E402"]  # module-level imports not at top due to arg parsing
